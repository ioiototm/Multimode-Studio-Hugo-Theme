<nav class="nav">
  <div class="nav-brand">
    <a class="logo" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
    {{ with .Site.Params.tagline }}<span class="nav-tagline">{{ . }}</span>{{ end }}
  </div>
  <div class="nav-right">
    <ul class="menu tabs">
      {{ $currentPage := . }}
      {{ range .Site.Menus.main }}
      <li>
        <a href="{{ .URL | relURL }}" class="tab-item {{ if or ($currentPage.IsMenuCurrent "main" .) ($currentPage.HasMenuCurrent "main" .) }}active{{ end }}">
          {{ if .Pre }}{{ partial "icon.html" (dict "name" .Pre "size" 14) }} {{ end }}
          <span>{{ .Name }}</span>
          <span class="tab-close">×</span>
        </a>
      </li>
      {{ end }}
    </ul>
    <button class="theme-toggle" type="button" aria-pressed="false" aria-label="Toggle color theme">
      <span class="theme-toggle-track">
        {{ partial "icon.html" (dict "name" "sun" "size" 16) }}
        {{ partial "icon.html" (dict "name" "moon" "size" 16) }}
      </span>
      <span class="theme-toggle-label">Day / Night</span>
    </button>
  </div>
</nav>
