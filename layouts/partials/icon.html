{{- $name := "" -}}
{{- $size := 18 -}}
{{- $class := "" -}}
{{- if reflect.IsMap . -}}
  {{- $name = .name | default "spark" -}}
  {{- $size = .size | default 18 -}}
  {{- $class = .class | default "" -}}
{{- else -}}
  {{- $name = . | default "spark" -}}
{{- end -}}
<svg class="icon icon-{{ $name }} {{ $class }}" viewBox="0 0 24 24" width="{{ $size }}" height="{{ $size }}" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
  {{- if eq $name "sun" -}}
    <circle cx="12" cy="12" r="4"></circle>
    <line x1="12" y1="2" x2="12" y2="4"></line>
    <line x1="12" y1="20" x2="12" y2="22"></line>
    <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"></line>
    <line x1="17.66" y1="17.66" x2="19.07" y2="19.07"></line>
    <line x1="2" y1="12" x2="4" y2="12"></line>
    <line x1="20" y1="12" x2="22" y2="12"></line>
    <line x1="4.93" y1="19.07" x2="6.34" y2="17.66"></line>
    <line x1="17.66" y1="6.34" x2="19.07" y2="4.93"></line>
  {{- else if eq $name "moon" -}}
    <path d="M21 14.5A8.5 8.5 0 0 1 9.5 3 7 7 0 1 0 21 14.5Z"></path>
  {{- else if eq $name "spark" -}}
    <path d="M12 3l1.6 4.6L18 9l-4.4 2.2L12 16l-1.6-4.8L6 9l4.4-1.4Z"></path>
  {{- else if eq $name "controller" -}}
    <path d="M7 12h2m6 0h2"></path>
    <path d="M5.5 7H18.5a3.5 3.5 0 0 1 3.3 4.6l-1.4 4a3.5 3.5 0 0 1-3.3 2.4H6.9a3.5 3.5 0 0 1-3.3-2.4l-1.4-4A3.5 3.5 0 0 1 5.5 7Z"></path>
    <circle cx="8.5" cy="11.5" r="0.8" fill="currentColor" stroke="none"></circle>
    <circle cx="15.5" cy="11.5" r="0.8" fill="currentColor" stroke="none"></circle>
  {{- else if eq $name "palette" -}}
    <path d="M12 4a8 8 0 1 0 0 16 2 2 0 0 0 2-2 1.5 1.5 0 0 1 1.5-1.5h2a2.5 2.5 0 0 0 0-5H16"></path>
    <circle cx="7.5" cy="9" r="1" fill="currentColor" stroke="none"></circle>
    <circle cx="9" cy="14" r="1" fill="currentColor" stroke="none"></circle>
    <circle cx="14" cy="7.5" r="1" fill="currentColor" stroke="none"></circle>
  {{- else if eq $name "note" -}}
    <path d="M9 18V6l9-2v12"></path>
    <circle cx="9" cy="18" r="2"></circle>
    <circle cx="18" cy="16" r="2"></circle>
  {{- else if eq $name "flask" -}}
    <path d="M10 2h4"></path>
    <path d="M12 2v8l4 6a3 3 0 0 1-2.5 5H10.5a3 3 0 0 1-2.5-5l4-6V2"></path>
    <path d="M9 14h6"></path>
  {{- else if eq $name "pen" -}}
    <path d="M6 18l-1 4 4-1 11-11a2.8 2.8 0 0 0-4-4Z"></path>
    <path d="M16 5l3 3"></path>
  {{- else if eq $name "wave" -}}
    <path d="M3 15s2.5-4 6-4 4 4 8 4 4-4 4-4"></path>
  {{- else if eq $name "star" -}}
    <path d="M12 3l2.2 4.8L19 8.6l-3.5 3.4.8 4.9-4.3-2.4-4.3 2.4.8-4.9L5 8.6l4.8-.8Z"></path>
  {{- else if eq $name "user" -}}
    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
    <circle cx="12" cy="7" r="4"></circle>
  {{- else if eq $name "file" -}}
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
    <polyline points="14 2 14 8 20 8"></polyline>
  {{- else if eq $name "mail" -}}
    <rect x="3" y="5" width="18" height="14" rx="2"></rect>
    <path d="M3 7l9 6 9-6"></path>
  {{- else if eq $name "github" -}}
    <path d="M12 2.5c-4.7 0-8.5 3.8-8.5 8.5A8.5 8.5 0 0 0 9 19.2c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.5-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.6 1.1 1.6 1.1.9 1.6 2.5 1.1 3.1.8.1-.7.4-1.1.7-1.4-2.7-.3-5.6-1.3-5.6-5.8 0-1.3.5-2.3 1.1-3.2 0-.3-.5-1.4.1-2.9 0 0 .9-.3 3 1.1a10.3 10.3 0 0 1 5.4 0c2.1-1.4 3-1.1 3-1.1.6 1.5.2 2.6.1 2.9.7.9 1.1 2 1.1 3.2 0 4.5-2.9 5.5-5.6 5.8.4.3.8 1 .8 2.1v3.1c0 .3.2.7.8.6a8.5 8.5 0 0 0 5.5-8.2c0-4.7-3.8-8.5-8.5-8.5Z" fill="currentColor" stroke="none"></path>
  {{- else if eq $name "itch" -}}
    <path d="M5 4h14l2 4v10a2 2 0 0 1-2 2h-4l-3-2-3 2H5a2 2 0 0 1-2-2V8Z"></path>
    <circle cx="9" cy="10" r="1" fill="currentColor" stroke="none"></circle>
    <circle cx="15" cy="10" r="1" fill="currentColor" stroke="none"></circle>
    <path d="M8 14s1 1 4 1 4-1 4-1" stroke-linecap="round"></path>
  {{- else if eq $name "bluesky" -}}
    <path d="M4 6c-.6-3.2 2.7-4.2 5.2-1.4L12 8l2.8-3.4C17.3 1.8 20.6 2.8 20 6c-.6 3-3.9 5.4-8 7-4.1-1.6-7.4-4-8-7Z"></path>
    <path d="M8.5 12.5 12 15l3.5-2.5" stroke-linecap="round"></path>
  {{- else -}}
    <circle cx="12" cy="12" r="4"></circle>
  {{- end -}}
</svg>
